<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <defs>
    <!-- лист -->
    <g id="leaf">
      <path d="M0 0 C 6 -3 9 -11 5 -20 C 4 -13 -4 -13 -5 -20 C -9 -11 -6 -3 0 0 Z"
            fill="#3f7d54" fill-opacity="0.11"/>
      <path d="M0 -1 L 3 -17" stroke="#3f7d54" stroke-opacity="0.16" stroke-width="0.8" fill="none"/>
    </g>

    <!-- ягода малины -->
    <g id="berry">
      <path d="M0 -10 L0 -18" stroke="#3f7d54" stroke-opacity="0.14" stroke-width="1.2" fill="none"/>
      <g fill="#c7245a" fill-opacity="0.13">
        <circle cx="-6" cy="-6" r="4"/><circle cx="0" cy="-6" r="4"/><circle cx="6" cy="-6" r="4"/>
        <circle cx="-9" cy="0" r="4"/><circle cx="-3" cy="0" r="4"/><circle cx="3" cy="0" r="4"/><circle cx="9" cy="0" r="4"/>
        <circle cx="-6" cy="6" r="4"/><circle cx="0" cy="6" r="4"/><circle cx="6" cy="6" r="4"/>
        <circle cx="-3" cy="11" r="4"/><circle cx="3" cy="11" r="4"/>
        <circle cx="0" cy="15" r="4"/>
      </g>
      <g fill="#7a1538" fill-opacity="0.05">
        <circle cx="0" cy="-6" r="1.4"/><circle cx="-3" cy="0" r="1.4"/><circle cx="3" cy="0" r="1.4"/>
        <circle cx="0" cy="6" r="1.4"/><circle cx="0" cy="15" r="1.4"/>
      </g>
    </g>

    <!-- веточка: стебель + листья + ягода -->
    <g id="sprig">
      <path d="M0 70 C 9 46 5 30 18 13" stroke="#3f7d54" stroke-opacity="0.13" stroke-width="1.6" fill="none"/>
      <use href="#leaf" transform="translate(2 52) rotate(-38) scale(0.9)"/>
      <use href="#leaf" transform="translate(9 33) rotate(30) scale(0.85)"/>
      <use href="#berry" transform="translate(20 5) scale(0.9)"/>
    </g>
  </defs>

  <use href="#sprig" transform="translate(60 90) rotate(8)"/>
  <use href="#sprig" transform="translate(250 100) rotate(-22) scale(0.85)"/>
  <use href="#sprig" transform="translate(160 210) rotate(14)"/>
  <use href="#sprig" transform="translate(312 300) rotate(-12) scale(0.9)"/>
  <use href="#berry" transform="translate(330 72) scale(0.8)"/>
  <use href="#berry" transform="translate(30 250) scale(0.85)"/>
  <use href="#leaf"  transform="translate(72 318) rotate(42) scale(1.1)"/>
  <use href="#leaf"  transform="translate(205 332) rotate(-28) scale(1.0)"/>
</svg>
